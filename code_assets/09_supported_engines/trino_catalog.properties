# Feature 9: Trino — connect to Snowflake Horizon Catalog
# Place this file in Trino's catalog directory as:
#   /etc/trino/catalog/snowflake_horizon.properties
# Trino >= 430 includes the Iceberg connector with REST catalog support.

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=https://scb47336.snowflakecomputing.com/polaris/api/catalog
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.token=${ENV:SNOWFLAKE_TOKEN}
iceberg.rest-catalog.warehouse=horizon_demo_db
iceberg.rest-catalog.vended-credentials-enabled=true
iceberg.rest-catalog.session-type=USER
fs.native-s3.enabled=true
s3.region=us-east-2
